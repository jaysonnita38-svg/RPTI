                    { text: "紧身西装！根本施展不开我大开大合的江湖动作！", scores: { gai: 3, shengyu: 2 } },
                    { text: "基础款正装。没有浮夸的配饰怎么体现我的潮流品味？", scores: { capper: 3, cashtrippy: 3 } },
                    { text: "过于艳丽的衣服。这完全破坏了我高深莫测的清冷人设。", scores: { jiangyunsheng: 3, laojiu: 1 } },
                    { text: "便宜货。老子就是吃糠咽菜也要攒钱穿高定！", scores: { gali: 3, lidaben: 2, kris: 1 } }
                ]
            },
            {
                q: "10. 大半夜兄弟打电话说他惹事了需要点钱摆平，你回答：",
                options: [
                    { text: "“卡号发来。顺便问一句，要不要我带几个人过去弄他？”", scores: { danke: 3, kali: 2, beibei: 1 } },
                    { text: "“兄弟，钱乃身外之物，我早算出来你最近有一劫。”", scores: { jiangyunsheng: 3, sasi: 1 } },
                    { text: "“借多少？只要不耽误我下周去打水光针买衣服都好说。”", scores: { lidaben: 3, cashtrippy: 2 } },
                    { text: "“老子比你还穷！不过锅里还有点剩饭，过来对付一口吧。”", scores: { taigexi: 3, lianma: 2, asen: 1 } }
                ]
            },
            {
                q: "11. 如果不搞艺术音乐了，你最可能去干嘛？",
                options: [
                    { text: "去小区门口当门卫，或者跟哥们合伙搞个搞笑短视频账号。", scores: { falao: 3, nuomi: 2 } },
                    { text: "开家硬核健身房，每天拿着鞭子逼着员工加练。", scores: { yanghesu: 3, aire: 1 } },
                    { text: "回老家开家大排档，专门卖那种油乎乎、重口味的烧烤。", scores: { gongfupang: 3, laojiu: 3 } },
                    { text: "搞个地下服装工作室，天天研究怎么把好好的布料做破做烂。", scores: { vansdaddy: 3, capper: 2, cashtrippy: 1 } }
                ]
            },
            {
                q: "12. 遇到人生低谷，感觉快撑不下去的时候你会：",
                options: [
                    { text: "狂喝闷酒，喝到断片，醒来假装什么都没发生。", scores: { liucong: 3, masiwei: 1, naiwan: 1 } },
                    { text: "去深山老林里看风景，或者在寺庙里呆坐一整天。", scores: { jiangyunsheng: 3, paikete: 2 } },
                    { text: "给自己加满电音滤镜，自己对着空气一顿乱哼。", scores: { lijialong: 3, sasi: 3 } },
                    { text: "不干了！回老家找以前的穷哥们，回去种地也无所谓。", scores: { asen: 3, lianma: 2 } }
                ]
            },
            {
                q: "13. 在你看来，在这个社会上混最重要的是什么？",
                options: [
                    { text: "拳头硬，实力强，遇到不服的直接动手，别人才怕你！", scores: { beibei: 3, danke: 2, shengyu: 1 } },
                    { text: "有钱有排场，能随时随地豪横地给全场人买单！", scores: { zitao: 3, kris: 2 } },
                    { text: "不管爬多高，永远记得自己是从最底层的烂泥里出来的。", scores: { vansdaddy: 3, asen: 3, gai: 1 } },
                    { text: "保持精致和体面，绝不在烂人烂事上弄脏自己的鞋。", scores: { gali: 3, manshuke: 2, lidaben: 2 } }
                ]
            },
            {
                q: "14. 每天早上醒来第一件事是干嘛？",
                options: [
                    { text: "摸一摸肌肉有没有掉，规划今天的训练动作。", scores: { yanghesu: 3, beibei: 1 } },
                    { text: "照镜子，欣赏自己完美的脸蛋和刚做的精致造型。", scores: { zitao: 3, lidaben: 3, kris: 1 } },
                    { text: "拿起手机看有没有人在背地里骂我，准备随时开战。", scores: { nuomi: 3, falao: 2 } },
                    { text: "点个极其丰盛的超级大早餐，吃饱了才有力气抱怨生活。", scores: { taigexi: 3, lianma: 1 } }
                ]
            },
            {
                q: "15. 如果必须给自己选一句墓志铭，你会选：",
                options: [
                    { text: "“这里躺着一个没有短板的满级人类”", scores: { aire: 3, wangyitai: 3 } },
                    { text: "“老子好帅”", scores: { nuomi: 3, falao: 1 } },
                    { text: "“电量已耗尽”", scores: { kali: 3, gongfupang: 2 } },
                    { text: "“来世还做中国人”", scores: { lianma: 3, vansdaddy: 2 } }
                ]
            }
        ];

        const App = () => {
            const [gameState, setGameState] = useState('start'); 
            const [currentQIndex, setCurrentQIndex] = useState(0);
            const [answers, setAnswers] = useState(Array(QUESTIONS.length).fill(null));
            const [resultRapper, setResultRapper] = useState(null);
            const [toastMsg, setToastMsg] = useState('');

            const startGame = () => {
                setGameState('quiz');
                setCurrentQIndex(0);
                setAnswers(Array(QUESTIONS.length).fill(null));
            };

            const handleSelectOption = (optIndex) => {
                const newAnswers = [...answers];
                newAnswers[currentQIndex] = optIndex;
                setAnswers(newAnswers);
            };

            const handlePrev = () => {
                if (currentQIndex > 0) setCurrentQIndex(currentQIndex - 1);
            };

            const handleNext = () => {
                if (answers[currentQIndex] === null) {
                    showToast("Bro，先选个答案再走吧！");
                    return;
                }
                if (currentQIndex < QUESTIONS.length - 1) {
                    setCurrentQIndex(currentQIndex + 1);
                } else {
                    calculateResult();
                }
            };

            const calculateResult = () => {
                setGameState('loading');
                // 第一题(index 0) 选了第3项(index 2)触发严浩翔
                if (answers[0] === 2) {
                    setTimeout(() => { setResultRapper('yanhaoxiang'); setGameState('result'); }, 1500);
                    return;
                }
                const finalScores = {};
                Object.keys(RAPPERS).forEach(k => finalScores[k] = 0);
                answers.forEach((ansIdx, qIdx) => {
                    if (ansIdx !== null) {
                        const option = QUESTIONS[qIdx].options[ansIdx];
                        if (option.scores) {
                            for (const [rapper, points] of Object.entries(option.scores)) {
                                if (finalScores[rapper] !== undefined) finalScores[rapper] += points;
                            }
                        }
                    }
                });
                let maxRapper = 'lianma', maxScore = -1;
                for (const [rapper, score] of Object.entries(finalScores)) {
                    if (rapper === 'yanhaoxiang') continue;
                    if (score > maxScore) { maxScore = score; maxRapper = rapper; }
                }
                setTimeout(() => { setResultRapper(maxRapper); setGameState('result'); }, 1500); 
            };

            const showToast = (msg) => {
                setToastMsg(msg);
                setTimeout(() => setToastMsg(''), 2500); 
            };

            const shareResult = async () => {
                const rapper = RAPPERS[resultRapper];
                const text = `我的RPTI人格是：【${rapper.title} - ${rapper.name}】🎤\n"${rapper.desc}"\n快来测测你的地下基因！`;
                if (navigator.share) {
                    try { await navigator.share({ title: 'RPTI测试', text, url: window.location.href }); return; } catch (err) {}
                }
                const textArea = document.createElement("textarea");
                textArea.value = text; document.body.appendChild(textArea); textArea.select();
                try { document.execCommand('copy'); showToast('✅ 文案已复制！'); } catch (err) { showToast('❌ 复制失败'); }
                document.body.removeChild(textArea);
            };

            if (gameState === 'start') {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-gradient-to-br from-pink-300 via-purple-300 to-indigo-400">
                        <div className="relative z-10 max-w-md w-full text-center fade-in bg-white/40 backdrop-blur-xl p-8 rounded-3xl border border-white/50 shadow-2xl">
                            <h1 className="text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-violet-500 mb-4 tracking-tighter drop-shadow-md">RPTI</h1>
                            <h2 className="text-2xl font-extrabold text-gray-800 mb-6 drop-shadow-sm">说唱人格测试 (地狱版)</h2>
                            <p className="text-gray-700 mb-8 text-sm leading-relaxed font-medium bg-white/50 p-4 rounded-2xl shadow-inner text-justify">
                                抛弃所有刻板印象。15道高度情景化的地狱生活题，剥开你的伪装，精准匹配你的灵魂。
                            </p>
                            <button onClick={startGame} className="w-full bg-gradient-to-r from-pink-500 to-violet-500 text-white font-black py-4 px-8 rounded-full shadow-lg transform transition hover:scale-105 active:scale-95 text-xl tracking-wide border-2 border-white/20">START</button>
                        </div>
                    </div>
                );
            }

            if (gameState === 'quiz') {
                const question = QUESTIONS[currentQIndex];
                const progress = ((currentQIndex) / QUESTIONS.length) * 100;
                const currentSelection = answers[currentQIndex];
                return (
                    <div className="min-h-screen flex flex-col p-6 bg-gradient-to-br from-cyan-100 via-pink-100 to-yellow-100 max-w-lg mx-auto relative pb-24">
                        <div className="w-full bg-white/50 rounded-full h-3 mb-8 mt-4 shadow-inner overflow-hidden border border-white/50">
                            <div className="bg-gradient-to-r from-pink-400 to-violet-500 h-3 rounded-full transition-all duration-300 shadow-md" style={{ width: `${progress}%` }}></div>
                        </div>
                        <div className="mb-4 text-violet-600 font-black text-sm tracking-widest bg-white/40 inline-block px-4 py-1 rounded-full w-max backdrop-blur-sm border border-white/50 shadow-sm">Q {currentQIndex + 1} / {QUESTIONS.length}</div>
                        <h2 className="text-xl sm:text-2xl font-black text-gray-800 mb-8 leading-tight fade-in drop-shadow-sm" key={`q-${currentQIndex}`}>{question.q}</h2>
                        <div className="space-y-4 flex-1">
                            {question.options.map((opt, i) => {
                                const isSelected = currentSelection === i;
                                return (
                                    <button key={i} onClick={() => handleSelectOption(i)} className={`w-full text-left p-5 rounded-2xl transition-all duration-200 active:scale-95 fade-in shadow-sm backdrop-blur-sm border-2 ${isSelected ? 'bg-white border-pink-500 shadow-pink-200 shadow-lg transform scale-[1.02]' : 'bg-white/60 hover:bg-white/90 border-white/50 text-gray-800 hover:shadow-md'}`} style={{ animationDelay: `${i * 0.1}s` }}>
                                        <span className={`text-base font-bold ${isSelected ? 'text-pink-600' : ''}`}>{opt.text}</span>
                                    </button>
                                );
                            })}
                        </div>
                        <div className="fixed bottom-0 left-0 w-full p-4 bg-white/30 backdrop-blur-md border-t border-white/50 flex justify-center gap-4 z-20">
                            <div className="max-w-lg w-full flex gap-4">
                                <button onClick={handlePrev} disabled={currentQIndex === 0} className={`flex-1 py-3 rounded-xl font-black text-sm transition-all border-2 ${currentQIndex === 0 ? 'bg-gray-200/50 text-gray-400 border-transparent cursor-not-allowed' : 'bg-white text-gray-700 border-white/80 hover:bg-gray-50 shadow-md active:scale-95'}`}>上一题</button>
                                <button onClick={handleNext} className={`flex-1 py-3 rounded-xl font-black text-sm transition-all border-2 ${currentSelection === null ? 'bg-gray-300/50 text-gray-500 border-transparent cursor-not-allowed' : 'bg-gradient-to-r from-pink-500 to-violet-500 text-white border-pink-400 shadow-md hover:scale-[1.02] active:scale-95'}`}>{currentQIndex === QUESTIONS.length - 1 ? '查看结果' : '下一题'}</button>
                            </div>
                        </div>
                        {toastMsg && <div className="fixed top-10 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-2xl font-bold text-sm z-50 fade-in whitespace-nowrap">{toastMsg}</div>}
                    </div>
                );
            }

            if (gameState === 'loading') {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-gradient-to-br from-yellow-200 via-pink-200 to-cyan-200">
                        <div className="animate-spin rounded-full h-20 w-20 border-t-4 border-b-4 border-pink-500 mb-6 shadow-xl"></div>
                        <h2 className="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-violet-500 animate-pulse drop-shadow-sm">正在提纯你的DNA...</h2>
                    </div>
                );
            }

            if (gameState === 'result') {
                const rapper = RAPPERS[resultRapper];
                const textColorClass = rapper.color.replace('300', '600').replace('400', '600').replace('500', '600');
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-gradient-to-br from-fuchsia-200 via-pink-200 to-cyan-200 max-w-lg mx-auto fade-in">
                        <div className="text-center w-full bg-white/70 backdrop-blur-xl rounded-3xl border-2 border-white/60 overflow-hidden shadow-2xl relative">
                            <div className="h-24 bg-gradient-to-r from-pink-400 via-purple-400 to-indigo-400 flex items-center justify-center"><span className="text-sm font-black tracking-[0.2em] text-white uppercase drop-shadow-md">Your Persona</span></div>
                            <div className="p-8 -mt-10 relative">
                                <div className="w-24 h-24 bg-white rounded-full border-4 border-pink-100 mx-auto flex items-center justify-center mb-4 shadow-xl transform hover:rotate-12 transition-transform"><span className="text-5xl">🎧</span></div>
                                <h3 className={`text-xl font-extrabold mb-1 ${textColorClass} drop-shadow-sm`}>[{rapper.title}]</h3>
                                <h1 className="text-4xl sm:text-5xl font-black text-gray-800 mb-6 uppercase tracking-tight drop-shadow-md">{rapper.name}</h1>
                                <div className="bg-white/60 rounded-2xl p-5 text-left border border-white shadow-inner mt-2"><p className="text-gray-700 font-medium text-sm leading-relaxed text-justify">{rapper.desc}</p></div>
                            </div>
                        </div>
                        <div className="w-full mt-6">
                            <p className="text-center text-xs text-pink-600 font-bold mb-3 bg-white/50 backdrop-blur-sm inline-block px-4 py-1 rounded-full w-max mx-auto block drop-shadow-sm">💡 提示：可以直接截图本页分享朋友圈哦</p>
                            <div className="flex gap-4">
                                <button onClick={shareResult} className="flex-1 bg-gradient-to-r from-pink-500 to-violet-500 text-white font-black py-4 rounded-2xl shadow-md hover:scale-105 active:scale-95 transition-all text-sm sm:text-base">一键分享</button>
                                <button onClick={startGame} className="flex-1 bg-white text-pink-600 font-black py-4 rounded-2xl border-2 border-pink-200 shadow-md hover:bg-pink-50 hover:scale-105 active:scale-95 transition-all text-sm sm:text-base">再测一次</button>
                            </div>
                        </div>
                        {toastMsg && <div className="fixed top-10 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-2xl font-bold text-sm z-50 fade-in whitespace-nowrap">{toastMsg}</div>}
                    </div>
                );
            }
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
